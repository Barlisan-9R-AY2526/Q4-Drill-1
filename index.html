<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 1</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-HwwvtgBNo3bZJJLYd8oVXjrBZt8cqVSpeBNS5n7C8IVInixGAoxmnlMuBnhbgrkm" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="styles.css">

</head>
<body>
    <div class="d-flex justify-content-center align-items-center" style="height: 100vh;">
        <div class="container bg-dark text-white p-4" style="max-width: 600px; border-radius: 10px;">
            <h1 class="text-center mb-4">Electricity Consumption Classifier</h1> 
            <div class="mb-3">
                <label for="consumption" class="form-label">Electricity Consumption (kWh):</label>
                <input type="number" id="consumption" name="consumption" class="form-control" min="0">
            </div>
            <div class="d-flex justify-content-center gap-2">
                <button type="button" class="btn btn-info" id="checkBtn" onclick="checkConsumption()">Check Consumption</button>
                <button type="button" class="btn btn-danger" onclick="window.location.reload()">Refresh</button>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
